# =============================================================================
# Patched Postiz nginx.conf — bind-mounted over /etc/nginx/nginx.conf
# =============================================================================
#
# Single change vs the upstream Postiz nginx.conf: a `location = /robots.txt`
# block that returns a permissive `User-agent: * / Allow: /`. The default
# Postiz config has no robots.txt, so requests for it fall through to the
# Next.js frontend which renders an HTML 404 page (with a `<meta robots
# noindex>` tag). When Meta's IG Graph API attempts to download a video for
# IG Reels publishing, it fetches `https://<host>/robots.txt` first, sees
# the HTML 404 + noindex meta, and treats the entire host as blocked,
# returning the cryptic error:
#
#   "Media download has failed: HTTP error code 403. Restricted by robots.txt"
#
# Without this fix, IG publishing is completely blocked even though the
# media URL itself is reachable (we verified with curl). Meta caches the
# result for ~24 hours per host, so this fix only takes effect after the
# cache expires for any host where it was previously broken.
#
# YouTube publishing works without this fix because YT doesn't honor
# robots.txt for upload URLs.
# =============================================================================

user                            www;
worker_processes                auto;

events {
    worker_connections          1024;
}

http {
    include                     /etc/nginx/mime.types;
    default_type                application/octet-stream;
    sendfile                    on;
    access_log                  /var/log/nginx/access.log;
    client_max_body_size 2G;
    server {
        listen 5000;
        server_name _;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # ----- robots.txt: permissive, served BEFORE the catch-all `location /` ---
        location = /robots.txt {
            add_header Content-Type text/plain;
            return 200 "User-agent: *\nAllow: /\n";
        }

        location /api/ {
            proxy_pass http://localhost:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Reload $http_reload;
            proxy_set_header Onboarding $http_onboarding;
            proxy_set_header Activate $http_activate;
            proxy_set_header Auth $http_auth;
            proxy_set_header Showorg $http_showorg;
            proxy_set_header Impersonate $http_impersonate;
            proxy_set_header Accept-Language $http_accept_language;
        }

        location /uploads/ {
            alias /uploads/;
        }

        location / {
            proxy_pass http://localhost:4200/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Reload $http_reload;
            proxy_set_header Onboarding $http_onboarding;
            proxy_set_header Activate $http_activate;
            proxy_set_header Auth $http_auth;
            proxy_set_header Showorg $http_showorg;
            proxy_set_header Impersonate $http_impersonate;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header i18next $http_i18next;
        }
    }
}
