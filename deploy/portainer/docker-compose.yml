# =============================================================================
# CommonCreed posting stack — Postiz + Temporal + sidecar
# =============================================================================
#
# This stack mirrors the official Postiz docker-compose pattern (which the
# maintainers actually run) plus our CommonCreed sidecar service.
#
# Stack layout:
#   postgres            — Postiz application data
#   redis               — Postiz BullMQ job queue
#   temporal-postgres   — DEDICATED Postgres for Temporal (do not share with
#                         Postiz; Temporal needs its own DB so visibility
#                         schema migrations don't fight Postiz's)
#   temporal-elasticsearch — visibility store for Temporal (sidesteps the
#                         "max 3 Text custom search attributes" limit that
#                         Postgres-only visibility hits with newer Postiz)
#   temporal            — workflow runtime that Postiz hard-requires since
#                         early 2025
#   postiz              — the social posting layer
#   commoncreed_sidecar — our FastAPI control plane (Plan 002)
#
# Resource budget on a 8 GB host (matches the maintainers' shape, +sidecar):
#   postgres            ~250 MB
#   redis               ~64  MB
#   temporal-postgres   ~250 MB
#   temporal-elasticsearch ~600 MB (256m heap + buffers)
#   temporal            ~700 MB
#   postiz              ~1.0 GB
#   sidecar             ~256 MB idle
#   ----------------------
#   subtotal            ~3.1 GB
#   leaves              ~4.9 GB on a 8 GB host for OS + pipeline subprocess
#                       peaks (~2 GB during a run).
#
# All secrets come from the .env file at the repo root. NEVER hardcode
# credentials here. See .env.example for the full list.
# =============================================================================

# -----------------------------------------------------------------------------
# Networks — split into two for clean isolation between Postiz application
# layer and Temporal infrastructure layer (matches official Postiz compose).
# -----------------------------------------------------------------------------
networks:
  commoncreed:
    driver: bridge
  temporal-network:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes — named volumes managed by Docker. On Synology, Portainer creates
# these under /volume1/@docker/volumes/ by default.
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    name: commoncreed_postgres_data
  postiz_uploads:
    name: commoncreed_postiz_uploads
  postiz_config:
    name: commoncreed_postiz_config
  temporal_postgres_data:
    name: commoncreed_temporal_postgres_data
  temporal_elasticsearch_data:
    name: commoncreed_temporal_elasticsearch_data
  commoncreed_output:
    name: commoncreed_output
  sidecar_db:
    name: commoncreed_sidecar_db

services:

  # ===========================================================================
  # Postiz application infrastructure
  # ===========================================================================

  postgres:
    image: postgres:16.4-alpine
    container_name: commoncreed_postgres
    restart: unless-stopped
    networks:
      - commoncreed
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7.4-alpine
    container_name: commoncreed_redis
    restart: unless-stopped
    networks:
      - commoncreed
    command: ["redis-server", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ===========================================================================
  # Temporal stack — required by Postiz since early 2025.
  # Mirrors the official Postiz docker-compose layout exactly. Do not try to
  # share Postiz's Postgres or skip Elasticsearch — both shortcuts have been
  # tried and break in distinct ways. See LOCAL_DEV.md troubleshooting.
  # ===========================================================================

  temporal-postgres:
    image: postgres:16-alpine
    container_name: commoncreed_temporal_postgres
    restart: unless-stopped
    networks:
      - temporal-network
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: commoncreed_temporal_elasticsearch
    restart: unless-stopped
    networks:
      - temporal-network
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    volumes:
      - temporal_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: commoncreed_temporal
    restart: unless-stopped
    networks:
      - temporal-network
      - commoncreed
    depends_on:
      temporal-postgres:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      ENABLE_ES: "true"
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
      TEMPORAL_NAMESPACE: default
      LOG_LEVEL: warn
    volumes:
      # Mount the dynamicconfig file from Postiz's official repo into the
      # path Temporal expects to find it.
      - ./temporal-dynamicconfig:/etc/temporal/config/dynamicconfig
    # No healthcheck — tctl was removed from temporal:1.28+ images and the
    # `temporal` CLI requires a config file to do remote checks. Postiz's
    # official compose doesn't healthcheck Temporal either; it just lets
    # Postiz retry the connection on its own. service_started is sufficient.
    deploy:
      resources:
        limits:
          memory: 900M
        reservations:
          memory: 400M

  # ===========================================================================
  # Postiz — self-hosted OSS posting layer (gitroomhq/postiz-app, AGPL-3.0).
  # Image: latest multi-arch tag. Maintainers do not publish semver tags.
  # Pin to a specific arch+timestamp tag for production after verification.
  # ===========================================================================
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:${POSTIZ_IMAGE_TAG:-latest}
    container_name: commoncreed_postiz
    restart: unless-stopped
    networks:
      - commoncreed
      - temporal-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        # service_started not service_healthy — Temporal has no healthcheck
        # (matches official Postiz compose pattern). Postiz retries on its own.
        condition: service_started
    environment:
      # --- Required core settings (per official Postiz compose) -------------
      MAIN_URL: ${POSTIZ_MAIN_URL}
      FRONTEND_URL: ${POSTIZ_FRONTEND_URL}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_FRONTEND_URL}/api
      JWT_SECRET: ${POSTIZ_JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # CRITICAL: without BACKEND_INTERNAL_URL the frontend cannot reach the
      # backend even though both run in the same container. The official
      # compose ships this as 'http://localhost:3000'.
      BACKEND_INTERNAL_URL: http://localhost:3000
      TEMPORAL_ADDRESS: temporal:7233
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: ${POSTIZ_DISABLE_REGISTRATION:-false}

      # CRITICAL for HTTP-only deployments (LAN/dev): without NOT_SECURED=true,
      # Postiz sets `Secure; SameSite=None` on its session cookies, which the
      # browser silently rejects when the page is loaded over plain HTTP. The
      # auth cookie never lands, the user gets bounced back to /auth on every
      # login/signup attempt, and the only symptom is "the page does nothing".
      # Set to false ONLY if you're behind HTTPS reverse proxy.
      NOT_SECURED: ${NOT_SECURED:-true}

      # --- Storage settings -------------------------------------------------
      STORAGE_PROVIDER: ${POSTIZ_STORAGE_PROVIDER:-local}
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads

      # --- Social platform OAuth credentials --------------------------------
      # Each platform requires its own OAuth app registration (Postiz cannot
      # ship shared credentials — Google/Meta tie OAuth to a developer account
      # and Postiz can't act on behalf of every self-hoster).
      # Create the apps manually and paste IDs/secrets into .env. See
      # LOCAL_DEV.md "OAuth setup" for the per-platform walkthrough.
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}

      # --- Misc -------------------------------------------------------------
      NX_ADD_PLUGINS: "false"
    volumes:
      - postiz_uploads:/uploads
      - postiz_config:/config
    ports:
      # Host port 5100 (5000 is taken by macOS AirPlay Receiver on dev Macs;
      # override via POSTIZ_HOST_PORT if you've disabled AirPlay or are on Linux)
      - "${POSTIZ_HOST_PORT:-5100}:5000"
    healthcheck:
      # Postiz image has neither curl nor wget. Use the bundled node runtime
      # to do an HTTP check. Accept any 2xx/3xx as healthy (Postiz root
      # returns 307 → /auth when unauthenticated).
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/', r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1200M
        reservations:
          memory: 512M

  # ===========================================================================
  # CommonCreed sidecar — FastAPI control plane (Plan 002 Unit 2 + downstream).
  # Reads the pipeline code read-only from the host checkout, owns its own
  # SQLite DB on a named volume, mounts the Docker socket for Unit 8 settings
  # restarts (with allowlist that excludes the sidecar itself).
  # ===========================================================================
  commoncreed_sidecar:
    build:
      context: ../../sidecar
      dockerfile: Dockerfile
    image: commoncreed/sidecar:0.1.0
    container_name: commoncreed_sidecar
    restart: unless-stopped
    networks:
      - commoncreed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postiz:
        condition: service_healthy
    environment:
      SIDECAR_ENV_PATH: /env/.env
      POSTIZ_BASE_URL: http://postiz:5000
      POSTIZ_API_KEY: ${POSTIZ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      GMAIL_OAUTH_PATH: ${GMAIL_OAUTH_PATH}
      SIDECAR_ADMIN_PASSWORD: ${SIDECAR_ADMIN_PASSWORD}
      PIPELINE_TRIGGER_TIME: ${PIPELINE_TRIGGER_TIME}
      PIPELINE_SLOT_MORNING: ${PIPELINE_SLOT_MORNING}
      PIPELINE_SLOT_EVENING: ${PIPELINE_SLOT_EVENING}
      PIPELINE_AUTO_APPROVE_OFFSET_MIN: ${PIPELINE_AUTO_APPROVE_OFFSET_MIN}
      PIPELINE_RETENTION_DAYS: ${PIPELINE_RETENTION_DAYS}
    volumes:
      - ../../scripts:/app/scripts:ro
      - commoncreed_output:/app/output
      - sidecar_db:/app/db
      - ../../.env:/env/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5050/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
