{% extends "base.html" %}
{% block title %}Runs - CommonCreed{% endblock %}
{% block content %}
<h1>Pipeline runs</h1>
<form method="get" action="/runs" style="margin-bottom: 16px; display: flex; gap: 12px; align-items: end;">
  <div class="form-row" style="margin: 0;">
    <label>Status</label>
    <select name="status">
      {% for opt in status_options %}
        <option value="{{ opt }}" {% if opt == status %}selected{% endif %}>{{ opt }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-row" style="margin: 0;">
    <label>From</label>
    <input type="text" name="date_from" value="{{ date_from or '' }}" placeholder="YYYY-MM-DD">
  </div>
  <div class="form-row" style="margin: 0;">
    <label>To</label>
    <input type="text" name="date_to" value="{{ date_to or '' }}" placeholder="YYYY-MM-DD">
  </div>
  <button type="submit">Filter</button>
</form>
{% include "_partials/runs_table.html" %}
{% endblock %}
