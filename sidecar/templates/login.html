<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in - CommonCreed</title>
  <style>
    body {
      margin: 0; background: #0e1116; color: #e6edf3;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    .box {
      background: #161b22; border: 1px solid #2a3140;
      border-radius: 8px; padding: 32px; width: 320px;
    }
    h1 { font-size: 18px; margin: 0 0 16px; }
    label { display: block; font-size: 12px; color: #8b949e; margin: 12px 0 4px; }
    input { width: 100%; padding: 8px 10px; background: #1c2230; color: #e6edf3;
            border: 1px solid #2a3140; border-radius: 6px; }
    button { margin-top: 20px; width: 100%; padding: 10px; background: #58a6ff;
             color: #0b1220; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .err { color: #f85149; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>CommonCreed dashboard</h1>
    <form method="post" action="/login">
      <label>Username</label>
      <input type="text" name="username" value="admin">
      <label>Password</label>
      <input type="password" name="password" autofocus>
      <button type="submit">Sign in</button>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
    </form>
  </div>
</body>
</html>
